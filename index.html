<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <meta name="darkreader-lock" />
  <title>Ficha Técnica TBT</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=18" />
  <!-- À prova de cache: impede o modo escuro do navegador de inverter a folha -->
  <style>:root{color-scheme:dark}.page{color-scheme:light}</style>
  <link rel="stylesheet" href="styles/reset.css?v=18" />
  <link rel="stylesheet" href="styles/tokens.css?v=18" />
  <link rel="stylesheet" href="styles/app.css?v=18" />
  <link rel="stylesheet" href="styles/ficha.css?v=18" />
  <link rel="stylesheet" href="styles/print.css?v=18" />
</head>
<body>
  <div id="app">
    <!-- Topbar -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo" id="brandLogoSlot"></span>
        <div>Ficha Técnica <small>de Produção</small></div>
      </div>
      <div class="ficha-id">
        <span class="ref" id="topRef">Nova ficha</span>
        <span class="desc" id="topDesc">—</span>
      </div>
      <div class="spacer"></div>
      <div class="seg" id="viewToggle">
        <button data-view="editor" class="active">Editor</button>
        <button data-view="library">Biblioteca</button>
      </div>
      <div class="actions" id="topActions"></div>
    </header>

    <!-- Workspace -->
    <div class="workspace" id="workspace">
      <nav class="tools" id="tools"></nav>
      <div class="canvas-scroll" id="canvasScroll">
        <div class="page" id="page"></div>
      </div>
      <aside class="inspector" id="inspector"></aside>
    </div>

    <!-- Biblioteca / Banco de produtos -->
    <div class="library" id="library" hidden></div>
  </div>

  <div class="toasts" id="toasts"></div>
  <div id="modalRoot"></div>

  <input type="file" id="fileImage" accept="image/png,image/jpeg,image/jpg,image/webp" multiple hidden />

  <!-- Firebase (nuvem opcional) — mesmo projeto do ERP -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script src="vendor/html-to-image.js?v=18"></script>
  <script type="module" src="src/main.js?v=18"></script>
</body>
</html>
